; PlatformIO project config
; Build: pio run
; Upload: pio run -t upload
; Monitor: pio device monitor

[platformio]
; Keep the existing flat project layout (sources at the repo root)
src_dir = .

[env:esp32-s2]
platform      = espressif32
board         = esp32-s2-saola-1        ; change to your specific S2 board if needed
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600

; Enable USB CDC serial on boot (most ESP32-S2 dev boards use native USB)
build_flags   =
  -D ARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
  adafruit/Adafruit GFX Library
  adafruit/Adafruit ST7735 and ST7789 Library
